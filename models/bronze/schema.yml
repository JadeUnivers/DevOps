version: 2

models:
  - name: bronze_hosts
    description: >
      Ingestion brute des hôtes Airbnb depuis le fichier CSV source.
      Tous les champs sont conservés en tant que chaînes de caractères (varchar).
    columns:
      - name: id
        description: Identifiant unique de l'hôte
        tests:
          - not_null
          - unique
      - name: name
        description: Nom de l'hôte
      - name: is_superhost
        description: Indicateur superhost (t/f)
        tests:
          - not_null
      - name: created_at
        description: Date de création du profil hôte
      - name: updated_at
        description: Date de dernière mise à jour du profil hôte

  - name: bronze_reviews
    description: >
      Ingestion brute des avis clients Airbnb depuis le fichier CSV source.
    columns:
      - name: listing_id
        description: Identifiant du logement concerné par l'avis
        tests:
          - not_null
      - name: date
        description: Date de l'avis
      - name: reviewer_name
        description: Nom du reviewer
      - name: comments
        description: Texte de l'avis
      - name: sentiment
        description: Sentiment de l'avis (positive/negative/neutral)
        tests:
          - accepted_values:
              values: ['positive', 'negative', 'neutral']

  - name: bronze_listings
    description: >
      Ingestion brute des logements Airbnb depuis le fichier CSV source.
    columns:
      - name: id
        description: Identifiant unique du logement
        tests:
          - not_null
          - unique
      - name: listing_url
        description: URL du logement sur Airbnb
      - name: name
        description: Nom du logement
      - name: room_type
        description: Type de logement (Entire home, Private room, etc.)
      - name: minimum_nights
        description: Nombre minimum de nuits requis
      - name: host_id
        description: Identifiant de l'hôte propriétaire
        tests:
          - not_null
      - name: price
        description: Prix par nuit (avec symbole $)
      - name: created_at
        description: Date de création de l'annonce
      - name: updated_at
        description: Date de dernière mise à jour de l'annonce
